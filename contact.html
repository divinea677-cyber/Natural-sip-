<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Natural Sip</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #f9f9f9; color: #333; }
        .contact-header { background: #1e5631; color: white; padding: 50px 20px; text-align: center; }
        .container { padding: 40px 20px; max-width: 600px; margin: auto; }
        .contact-form { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #1e5631; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        .btn-submit { background: #d4af37; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-submit:hover { background: #b8962d; }
        .back-home { display: block; text-align: center; margin-top: 30px; color: #1e5631; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="contact-header">
        <h1>Get in Touch</h1>
        <p>Questions about our juices? We'd love to hear from you.</p>
    </div>

    <div class="container">
        <div class="contact-form">
            <form>
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Natural sip" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="divinea677@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Tell us how we can help..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>

        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

</body>
</html>
